<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111"><link rel="manifest" href="/static/manifest.webmanifest"><title>StreamScout</title><style>:root{font-family:system-ui;color-scheme:dark}body{margin:0;background:#0b0b0d;color:#fff}main{max-width:720px;margin:auto;padding:28px 18px 80px}h1{font-size:42px;margin:18px 0 4px}.sub,small{color:#aaa}.card{background:#17171b;border:1px solid #29292e;border-radius:20px;padding:18px;margin:14px 0}label{display:block;font-weight:700;margin:14px 0 7px}input,select,button{width:100%;box-sizing:border-box;border-radius:13px;padding:14px;font-size:16px}input,select{background:#0e0e11;color:#fff;border:1px solid #36363c}button{border:0;background:#fff;color:#000;font-weight:800;margin-top:18px}.progress{height:11px;background:#29292e;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:#fff}.clip{display:block;text-decoration:none;color:#fff;padding:13px;border-radius:12px;background:#24242a;margin:10px 0}</style></head><body><main><h1>StreamScout</h1><p class="sub">Vind de beste momenten uit lange IRL-streams.</p><div class="card"><form id="form"><label>Openbare VOD-link</label><input id="url" type="url" required placeholder="https://www.twitch.tv/videos/..."><label>Aantal clips</label><input id="amount" type="number" value="20" min="1" max="100"><label>Lengte</label><select id="seconds"><option>30</option><option selected>45</option><option>60</option><option>90</option></select><label>Kwaliteit analyse</label><select id="model"><option value="tiny">Snel</option><option value="small" selected>Goed</option><option value="medium">Beter, trager</option></select><button id="go">Analyseer stream</button></form></div><div class="card" id="status" hidden><strong id="message">Starten</strong><div class="progress"><div class="bar" id="bar"></div></div><small id="percent">0%</small></div><div id="results"></div><script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/static/sw.js');form.onsubmit=async e=>{e.preventDefault();go.disabled=true;let body={url:url.value,amount:+amount.value,clip_seconds:+seconds.value,model_size:model.value,vertical:true};let r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});let j=await r.json();status.hidden=false;poll(j.id)};async function poll(id){let r=await fetch('/api/jobs/'+id),j=await r.json();message.textContent=j.message;bar.style.width=j.progress+'%';percent.textContent=j.progress+'%';if(j.status==='done'){go.disabled=false;results.innerHTML='<div class="card"><h2>Clips</h2>'+j.results.map((x,i)=>`<a class="clip" target="_blank" href="${x.url}"><b>Clip ${i+1}</b><br><small>Score ${x.score} · ${x.reason}</small></a>`).join('')+'</div>';return}if(j.status==='error'){go.disabled=false;message.textContent='Fout: '+j.message;return}setTimeout(()=>poll(id),2500)}</script></main></body></html>
